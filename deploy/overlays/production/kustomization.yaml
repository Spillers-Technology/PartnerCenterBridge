apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: partnercenterbridge

resources:
  - ../../base
  - namespace.yaml
  - secrets.sops.yaml   # SOPS-encrypted; see README before committing real values

patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: pcbridge

# Non-secret operator-plane + partner config. Secrets come from secrets.sops.yaml.
configMapGenerator:
  - name: pcbridge-config
    literals:
      - Auth__Authority=https://auth.example.com/application/o/partnercenterbridge/
      - Auth__Audience=partnercenterbridge
      - Auth__NameClaim=preferred_username
      - Cors__AllowedOrigins__0=https://pcbridge.example.com
      - Partner__PartnerTenantId=00000000-0000-0000-0000-000000000000
      - Partner__ClientId=00000000-0000-0000-0000-000000000000

# Pin the images your CI/Flux build publishes.
images:
  - name: partnercenterbridge-api
    newName: ghcr.io/spillers-technology/partnercenterbridge-api
    newTag: v0.1.0
  - name: partnercenterbridge-web
    newName: ghcr.io/spillers-technology/partnercenterbridge-web
    newTag: v0.1.0
