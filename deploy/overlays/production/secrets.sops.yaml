# PLACEHOLDER — encrypt with SOPS (age) before committing, exactly like the other homelab apps:
#   sops --encrypt --in-place deploy/overlays/production/secrets.sops.yaml
# Flux's SOPS decryption will materialise this Secret at apply time. Never commit plaintext values.
apiVersion: v1
kind: Secret
metadata:
  name: pcbridge-secrets
type: Opaque
stringData:
  # EF Core / Npgsql connection to the shared Postgres.
  ConnectionStrings__Postgres: "Host=postgres.databases.svc;Port=5432;Database=pcbridge;Username=pcbridge;Password=CHANGEME"
  # Multi-tenant Entra (SAM) app secret.
  Partner__ClientSecret: "CHANGEME"
  # One-time seed from the interactive MFA bootstrap; rotated automatically thereafter.
  Partner__SeedRefreshToken: "CHANGEME"
